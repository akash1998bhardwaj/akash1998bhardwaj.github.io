<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma UI/UX Designs | Akash Bhardwaj</title>
    <meta name="description"
        content="View high-fidelity Figma UI/UX designs and landing pages created by Akash Bhardwaj.">
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <!-- Link Stylesheets -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/work.css">
    <style>
        .figma-showcase-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        @media (max-width: 768px) {
            .figma-showcase-container {
                grid-template-columns: 1fr;
            }
        }

        .figma-card {
            position: relative;
            width: 100%;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            background: #101217;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .figma-card::after {
            content: 'Click to view full design';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .figma-card:hover::after {
            opacity: 1;
        }

        /* Hover scroll effect using an inner wrapper */
        .figma-card-inner {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .figma-card img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .figma-card:hover img {
            /* We will calculate the exact scroll amount using JS or rough estimate */
            /* A CSS-only hack for tall images: translate to bottom */
            transform: translateY(calc(-100% + 450px));
        }

        /* Modal Styles */
        .figma-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 17, 0.95);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 60px 20px;
        }

        .figma-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .figma-modal-close {
            position: fixed;
            top: 20px;
            right: 30px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10000;
            transition: background 0.3s ease;
        }

        .figma-modal-close:hover {
            background: var(--accent-primary);
            color: #000;
        }

        .figma-modal-content {
            width: 100%;
            max-width: 1200px;
            margin: auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border-radius: 8px;
            overflow: hidden;
            transform: translateY(30px);
            transition: transform 0.4s ease;
        }

        .figma-modal.active .figma-modal-content {
            transform: translateY(0);
        }

        .figma-modal-content img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body class="work-page">
    <!-- Curtain Loading Screen -->
    <div class="page-load-curtain" id="page-curtain">
        <div class="curtain-glow"></div>
        <div class="curtain-loader">
            <span class="loader-percentage" id="loader-percent">0%</span>
            <div class="loader-bar-wrap">
                <div class="loader-bar-fill" id="loader-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- WebGL Background Canvas -->
    <canvas id="webgl-canvas"></canvas>

    <!-- Custom Cursor -->
    <div id="custom-cursor">
        <div class="cursor-ring"></div>
        <div class="cursor-dot"></div>
    </div>

    <!-- Header Navigation -->
    <header class="work-header">
        <a href="index.html" class="logo" id="header-logo-link">
            <!-- Custom Prism Monogram (SVG) -->
            <svg class="logo-svg" width="28" height="28" viewBox="0 0 28 28" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <g class="logo-icon-group">
                    <!-- Left stem (green to blue gradient) -->
                    <path d="M14 2L5 24H11L14 16H17L14 2Z" fill="url(#logo-grad-1)" class="logo-icon-part-1" />
                    <!-- Right stem (cyan to purple gradient with screen blend mode overlay) -->
                    <path d="M14 2L23 24H17L14 16H11L14 2Z" fill="url(#logo-grad-2)" class="logo-icon-part-2"
                        style="mix-blend-mode: screen; opacity: 0.85;" />
                    <!-- Floating neon crossbar -->
                    <path d="M10 16H18" stroke="#00ffaa" stroke-width="2" stroke-linecap="round"
                        class="logo-icon-crossbar" />
                    <!-- Accent focus dot -->
                    <circle cx="14" cy="9" r="1.5" fill="#ffffff" class="logo-icon-dot" />
                </g>
                <defs>
                    <linearGradient id="logo-grad-1" x1="5" y1="2" x2="17" y2="20" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#00ffaa" />
                        <stop offset="1" stop-color="#0088ff" />
                    </linearGradient>
                    <linearGradient id="logo-grad-2" x1="23" y1="2" x2="11" y2="20" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#00e5ff" />
                        <stop offset="1" stop-color="#9900ff" />
                    </linearGradient>
                </defs>
            </svg>
            <!-- Typographic Layout (HTML/CSS) -->
            <span class="logo-text-wrap">
                <span class="logo-text">AKASH</span>
                <span class="logo-subtext">STUDIO</span>
            </span>
        </a>

        <a href="index.html" class="contact-btn" id="back-home-btn">
            <span class="contact-icon"
                style="transform: rotate(180deg); display: inline-flex; align-items: center; margin-right: 2px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </span>
            <span>Back to Home</span>
        </a>
    </header>

    <!-- Main Container -->
    <main class="work-grid-container">
        <!-- Hero Intro Section -->
        <section class="work-hero">
            <div class="section-indicator">
                <span class="dot"></span>
                <span>UI/UX Showcase</span>
            </div>
            <h1 class="work-hero-title">Figma Designs</h1>
            <p class="work-hero-desc">Explore full-length, high-fidelity UI/UX layouts crafted with extreme attention to detail and modern web aesthetics.</p>
        </section>

        <!-- Figma Designs Grid -->
        <section class="figma-showcase-container">
            <div class="figma-card" data-src="assets/images/figma/Desktop - 1.png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 1.jpg" alt="Figma Design Desktop 1" loading="lazy">
                </div>
            </div>
            <div class="figma-card" data-src="assets/images/figma/Desktop - 1 (1).png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 1 (1).jpg" alt="Figma Design Desktop 1 (1)" loading="lazy">
                </div>
            </div>
            <div class="figma-card" data-src="assets/images/figma/Desktop - 1 (2).png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 1 (2).jpg" alt="Figma Design Desktop 1 (2)" loading="lazy">
                </div>
            </div>
            <div class="figma-card" data-src="assets/images/figma/Desktop - 1 (3).png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 1 (3).jpg" alt="Figma Design Desktop 1 (3)" loading="lazy">
                </div>
            </div>
            <div class="figma-card" data-src="assets/images/figma/Desktop - 1 (4).png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 1 (4).jpg" alt="Figma Design Desktop 1 (4)" loading="lazy">
                </div>
            </div>
            <div class="figma-card" data-src="assets/images/figma/Desktop - 2.png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 2.jpg" alt="Figma Design Desktop 2" loading="lazy">
                </div>
            </div>
            <div class="figma-card" data-src="assets/images/figma/Desktop - 2 (1).png">
                <div class="figma-card-inner">
                    <img src="assets/images/figma/thumbs/Desktop - 2 (1).jpg" alt="Figma Design Desktop 2 (1)" loading="lazy">
                </div>
            </div>
        </section>
    </main>

    <!-- Figma Modal -->
    <div class="figma-modal" id="figma-modal">
        <div class="figma-modal-close" id="figma-modal-close">&times;</div>
        <div class="figma-modal-content">
            <img src="" alt="Full Figma Design" id="figma-modal-img">
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer" id="site-footer" style="margin-top: 100px;">
        <div class="footer-bar">
            <span class="footer-copy">&copy; 2026 Akash Bhardwaj. Carefully crafted with Figma & Frontend Magic. All rights
                reserved.</span>
            <button class="back-to-top-btn" id="back-to-top-btn" style="position: relative; z-index: 100;">
                <span>Back to Top</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 15l-6-6-6 6" />
                    <path d="M12 21V3" />
                </svg>
            </button>
        </div>
    </footer>

    <!-- GSAP & Three.js Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <!-- Base Layout Scripts -->
    <script src="assets/js/three-bg.js"></script>
    <script src="assets/js/work.js"></script>
    <script>
        // Back to top behavior
        document.getElementById('back-to-top-btn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Figma Modal Logic
        const modal = document.getElementById('figma-modal');
        const modalImg = document.getElementById('figma-modal-img');
        const closeModal = document.getElementById('figma-modal-close');
        const cards = document.querySelectorAll('.figma-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const src = card.getAttribute('data-src');
                modalImg.src = src;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; // prevent background scroll
            });
        });

        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            document.body.style.overflow = '';
            setTimeout(() => {
                modalImg.src = '';
            }, 400); // clear image after transition
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => {
                    modalImg.src = '';
                }, 400);
            }
        });
    </script>
</body>
</html>
